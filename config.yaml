baseURL: https://vyas.dev
languageCode: "en"
defaultContentLanguage: "en"
title: "Devendra Vyas"
theme: PaperMod

# Site parameters
params:
  author:
    name: Devendra Vyas
    email: vyasdevms@gmail.com
  description: "Freelance ML engineer and AI strategy consultant — MLOps audits, AI readiness, edge perception, on-prem Gen AI. Based in Europe, remote worldwide."
  schema:
    publisherType: Person
    sameAs:
      - https://vyas.dev/
      - https://linkedin.com/in/devendravyas
      - https://github.com/skat00sh
      - https://scholar.google.com/citations?user=5MVuvHAAAAAJ&hl=en
  socialIcons:
    - name: github
      url: "https://github.com/skat00sh"
    - name: linkedin
      url: "https://linkedin.com/in/devendravyas"
    - name: email
      url: "mailto:vyasdevms@gmail.com"
  defaultTheme: auto
  footer:
    text: "[Impressum](/impressum/) · [Datenschutz](/datenschutz/) · [Sitemap](/sitemap/)"
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: false
  ShowWordCount: true
  ShowFullTextinRSS: false
  
  # Profile mode (disabled to show posts list with intro)
  profileMode:
    enabled: false
    title: "Devendra Vyas"
    subtitle: "ML engineer · edge perception · production AI · private Gen AI"
    imageUrl: "images/profile.jpg"  # You'll need to add this image
    imageTitle: "Devendra Vyas"
    imageLink: "https://github.com/skat00sh"
    buttons:
      - name: GitHub
        url: "https://github.com/skat00sh"
      - name: LinkedIn
        url: "https://linkedin.com/in/devendravyas"  # Update with your LinkedIn URL
      - name: Email
        url: "mailto:vyasdevms@gmail.com"

  # Home info mode - shows intro section on home page
  homeInfoParams:
    Title: "Hi there 👋"
    Content: "Thanks for stopping by—I'm Devendra, an ML engineer who ships systems that have to run reliably in production, not just score well in a notebook.

              I write here about edge perception, MLOps, and private Gen AI. 
              For work, I take on freelance engagements—from AI strategy and “do we need this?” assessments to MLOps audits and a practical path to integrate ML or Gen AI when it actually fits. See [consulting](/consulting/) for offerings, [CV](/cv/) for background, or reach out via the links below."
    AlignSocialIconsTo: "left"

# Menu configuration
menu:
  main:
    - identifier: home
      name: Home
      url: /
      weight: 10
    - identifier: cv
      name: CV
      url: /cv/
      weight: 20
    - identifier: consulting
      name: Consulting
      url: /consulting/
      weight: 25
    - identifier: posts
      name: Blog
      url: /posts/
      weight: 30
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 40
    - identifier: search
      name: Search
      url: /search/
      weight: 50

# Output configuration
outputs:
  home:
    - HTML

languages:
  en:
    languageName: "English"
    weight: 1
    taxonomies:
      category: categories
      tag: tags
      series: series

